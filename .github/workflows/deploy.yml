name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - data/history_states/**
      - index.html
      - app.js
      - styles.css
      - data.js
      - build.py
      - .github/workflows/deploy.yml
  pull_request:
    branches: [main]
    paths:
      - data/history_states/**
      - index.html
      - app.js
      - styles.css
      - data.js
      - build.py
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify data.js is in sync with data/history_states/
        run: python build.py --check

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Rebuild data.js from sources
        run: python build.py
      - name: Stage site files
        run: |
          mkdir -p dist
          cp index.html app.js styles.css data.js dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
